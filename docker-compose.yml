# =============================================================================
# Wiki.js + MCP-Server — Team-Wissensspeicher-Appliance
# =============================================================================
# Vier Services, EIN Host, EINE Domain:
#   db     Postgres 15 (Wiki.js-Datenbank)
#   wiki   Wiki.js 2 (offizielles Image — unabhängig updatebar)
#   mcp    MCP-Server (dieses Repo) — OAuth mit Wiki.js-Login, /me, Guardrails
#   caddy  Reverse-Proxy mit Auto-HTTPS: eine Domain für Wiki UND MCP
#          (gleiche Domain = Ein-Klick-SSO: die Wiki-Session gilt beim Autorisieren)
#
# Quick-Start:
#   cp .env.example .env        # DOMAIN, Passwörter, MCP_SESSION_SECRET setzen
#   docker compose up -d
#   https://<DOMAIN>            → Wiki.js (Setup beim ersten Start)
#   https://<DOMAIN>/mcp        → MCP-Endpoint (Connector-URL für alle Clients)
#   https://<DOMAIN>/me         → eigene KI-Zugänge ansehen/widerrufen
#
# Update:   docker compose pull && docker compose build --pull mcp && docker compose up -d
# Logs:     docker compose logs -f
# Backup:   der db-backup-Service sichert automatisch BEIDES ins db-backups-Volume:
#           Postgres (Wiki-Inhalte) via pg_dump UND die MCP-sqlite (Audit-Log +
#           Sessions) via `sqlite3 .backup`. Volume off-host replizieren.
# Reset:    docker compose down -v   # ACHTUNG: löscht ALLE Daten

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    # Resource-Ceilings, damit kein Service den Appliance-Host OOMt.
    mem_limit: 512m
    cpus: 1.0
    environment:
      POSTGRES_DB: wiki
      POSTGRES_USER: wikijs
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD fehlt — bitte .env anlegen}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wikijs -d wiki"]
      interval: 10s
      timeout: 5s
      retries: 5

  wiki:
    image: requarks/wiki:2
    restart: unless-stopped
    # Höheres Ceiling: Wiki.js rendert Seiten in Node (der schwerste Service).
    mem_limit: 1g
    cpus: 1.5
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: wikijs
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: wiki
      # DB-Connection-Pool von Wiki.js (Knex). Default des Images wäre max 10 —
      # mit parallelen KI-Agenten + Browser-Nutzung zu knapp. 20 direkte
      # Verbindungen sind für Postgres (max_connections=100) völlig unkritisch;
      # PgBouncer ist bei EINER Wiki-Instanz unnötig.
      DB_POOL_MIN: ${WIKIJS_DB_POOL_MIN:-2}
      DB_POOL_MAX: ${WIKIJS_DB_POOL_MAX:-20}
    volumes:
      # Wie die config.yml des Images, plus pool-Block (siehe Datei-Kommentar).
      - ./deploy/wiki/config.yml:/wiki/config.yml:ro
    # Kein Port nach außen — Zugriff ausschließlich über caddy.

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${MCP_IMAGE:-wikijs-mcp:local}
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    environment:
      # Wiki.js über das interne Docker-Netz — kein Traffic verlässt den Host,
      # keine Rate-Limits/Firewalls zwischen MCP und Wiki (das Vercel-Problem).
      WIKIJS_URL: http://wiki:3000
      # Öffentliche Basis-URL (OAuth-Issuer, Discovery, Links) — MUSS zur Domain passen.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://${DOMAIN:?DOMAIN fehlt — bitte .env anlegen}}
      # OAuth an: Login = Wiki.js-Login, Sessions verschlüsselt in /data.
      MCP_SESSION_SECRET: ${MCP_SESSION_SECRET:?MCP_SESSION_SECRET fehlt — bitte .env anlegen}
      MCP_DATA_DIR: /data
      # Rechte kommen pro User aus Wiki.js → Ceiling öffnen, Agenten-Schutz als Overlay.
      WIKIJS_PERMISSION_PRESET: ${WIKIJS_PERMISSION_PRESET:-full}
      WIKIJS_OAUTH_ROLE: ${WIKIJS_OAUTH_ROLE:-wiki}
      # Seiten mit diesen Tags sind für KI unsichtbar & unantastbar (leer = aus).
      WIKIJS_BLOCKED_TAGS: ${WIKIJS_BLOCKED_TAGS:-kein-ki}
      WIKIJS_AUDIT: ${WIKIJS_AUDIT:-true}
      # Max. gleichzeitige GraphQL-Requests an Wiki.js — unter DB_POOL_MAX halten,
      # damit fürs Browsen der Menschen Pool-Luft bleibt.
      WIKIJS_MAX_CONCURRENCY: ${WIKIJS_MAX_CONCURRENCY:-12}
    volumes:
      - mcp-data:/data
    depends_on:
      - wiki

  # Periodisches Backup mit Retention — deckt BEIDE Datenquellen ab:
  #   Postgres (Wiki-Inhalte) via pg_dump, und die MCP-sqlite (Audit-Log +
  #   Sessions) via `sqlite3 .backup` (konsistenter Hot-Backup, kein naives cp).
  # Restore Wiki:
  #   docker compose stop wiki
  #   docker compose exec db sh -c 'pg_restore -U wikijs -d wiki --clean /backups/<datei>.dump'
  #   docker compose start wiki
  # Restore MCP-Store: mcp stoppen, mcp-<ts>.sqlite als /data/mcp.sqlite einspielen, mcp starten.
  db-backup:
    image: postgres:15-alpine
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_KEEP: ${BACKUP_KEEP:-7}
    volumes:
      - db-backups:/backups
      # MCP-Store read-write mitmounten: der sqlite-Online-Backup nimmt einen
      # WAL-Read-Lock (braucht Schreibzugriff aufs -shm), läuft aber gefahrlos
      # parallel zum MCP-Writer.
      - mcp-data:/mcp-data
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache sqlite >/dev/null 2>&1 || true
        while true; do
          ts=$$(date +%Y%m%d-%H%M%S)
          if pg_dump -h db -U wikijs -d wiki -F c -f "/backups/wiki-$$ts.dump"; then
            echo "backup ok: wiki-$$ts.dump"
            ls -1t /backups/wiki-*.dump 2>/dev/null | tail -n +$$((BACKUP_KEEP + 1)) | xargs -r rm --
          else
            echo "backup FAILED (postgres) at $$ts" >&2
          fi
          if [ -f /mcp-data/mcp.sqlite ]; then
            if sqlite3 /mcp-data/mcp.sqlite ".backup '/backups/mcp-$$ts.sqlite'"; then
              echo "backup ok: mcp-$$ts.sqlite"
              ls -1t /backups/mcp-*.sqlite 2>/dev/null | tail -n +$$((BACKUP_KEEP + 1)) | xargs -r rm --
            else
              echo "backup FAILED (mcp sqlite) at $$ts" >&2
            fi
          fi
          sleep "$$BACKUP_INTERVAL_SECONDS"
        done

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.5
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - wiki
      - mcp

volumes:
  db-data:
  db-backups:
  mcp-data:
  caddy-data:
  caddy-config:
