name: Docker — Build & Push

# Wann läuft der Build?
#   - bei jedem Push auf main → Image-Tags `main` + `sha-<git-sha>`
#   - bei git-Tags vX.Y.Z      → zusätzlich `vX.Y.Z` + `latest`
#   - bei jedem PR             → Build only (Smoke-Test ohne Push)
#   - manuell (workflow_dispatch)

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Migration auf Node 24 als Default für JavaScript-basierte Actions —
  # Node 20 wird in den GitHub-Runnern ab Q3 2026 entfernt. Lokal-Aktionen
  # (actions/*, docker/*) sind dann Node-24-kompatibel.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # Test-Gate: der Build (und damit jeder Image-Push, auch bei Release-Tags)
  # läuft nur, wenn Typecheck + Tests + Build durch sind.
  test:
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Für Build-Provenance / Attestations
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch-Builds: branch-Name als Tag (main → main)
            type=ref,event=branch
            # PR-Builds: pr-N
            type=ref,event=pr
            # Semver-Tags: v1.2.3, 1.2, 1, latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Git-SHA als kurzer Tag, immer
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=wikijs-mcp
            org.opencontainers.image.description=MCP-Server für Wiki.js — OAuth mit Wiki.js-Login, per-User-Rechte, Tag-Guardrail
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # Multi-Arch ist nice-to-have. linux/amd64 reicht erstmal —
          # arm64 verdoppelt den Build aufgrund von QEMU-Emulation.
          # Für arm64 zusätzlich: platforms: linux/amd64,linux/arm64
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          # Bei PRs nicht pushen, aber ins lokale Docker laden, damit der
          # Smoke-Test unten das echte Image starten kann.
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build-Provenance signieren (Sigstore via OIDC)
          provenance: true
          sbom: true

      - name: Smoke-Test — Container startet & /api/health antwortet
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          # /api/health hat KEINE Upstream-Abhängigkeit (kein Wiki nötig), also
          # muss der frisch gebaute Container die Route ohne weiteres bedienen.
          tag=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          docker run -d --name smoke -p 3000:3000 -e MCP_SESSION_SECRET=ci-smoke-secret-0123456789 "$tag"
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/api/health | grep -q '"ok":true'; then
              echo "health OK after ${i}s"; docker rm -f smoke; exit 0
            fi
            sleep 1
          done
          echo "health endpoint did not come up"; docker logs smoke; docker rm -f smoke; exit 1

      - name: Image-Summary
        if: github.event_name != 'pull_request'
        run: |
          echo "## Veröffentlichtes Image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
