name: CI — Typecheck, Tests & Build

# Sanity-Checks:
# - TypeScript kompiliert (tsc --noEmit)
# - Offline-Testsuiten (Policy, Navigation, Semaphore, Context, OAuth,
#   Guardrails, Routing, Format)
# - Next.js-Produktionsbuild läuft durch (standalone output)
#
# Aufgerufen als GATE vom Docker-Build (workflow_call) — so laufen die Checks
# auch bei Release-Tags, bevor ein Image gepusht wird. workflow_dispatch für
# manuelle Läufe.

on:
  workflow_call:
  workflow_dispatch:

# Least privilege: npm ci / Tests führen Dependency-Lifecycle-Skripte aus —
# der Job braucht nur Lese-Zugriff auf das Repo.
permissions:
  contents: read

env:
  # Node 24 als Action-Runtime — Node 20 wird in GitHub-Runnern
  # ab Q3 2026 entfernt.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  server:
    name: MCP-Server — Typecheck + Tests + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-for-wiki-js
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Node 24: node:sqlite (OAuth-Session-Store) ist hier stabil —
          # gleiche Major-Version wie das Docker-Runtime-Image.
          node-version: "24"
          cache: "npm"
          cache-dependency-path: mcp-for-wiki-js/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      # Gate auf HIGH+: blockt ernste CVEs in Runtime-Deps, lässt fixbare
      # Moderates (oft transitiv, brauchen Parent-Patch) als Warnung durch.
      - name: Security-Audit (Runtime-Deps)
        run: npm audit --omit=dev --audit-level=high

      - name: Typecheck
        run: npm run typecheck

      - name: Offline-Tests
        run: npm test

      - name: Build (standalone)
        run: npm run build

      - name: Verify standalone output
        run: |
          test -f .next/standalone/server.js || (echo "standalone server.js fehlt" && exit 1)
          echo "OK: standalone bundle gebaut"
