{{- if .Values.global.metrics.servicemonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "wikijs-mcp.fullname" . }}
  labels: {{ include "wikijs-mcp.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels: {{ include "wikijs-mcp.selectorLabels" . | nindent 6 }}
  endpoints:
  - port: http
    path: /metrics
{{- end }}
