apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wikijs-mcp.fullname" . }}-env
  labels: {{ include "wikijs-mcp.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.config.oauth.sessionSecret }}
  MCP_SESSION_SECRET: {{ .Values.config.oauth.sessionSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.wikijs.token }}
  WIKIJS_TOKEN: {{ .Values.config.wikijs.token | b64enc | quote }}
  {{- end }}
  {{- if and (not .Values.config.oauth.sessionSecret) (not .Values.config.wikijs.token) }}
  # Neither OAuth nor a single-tenant token configured — clients must bring
  # their own credentials per request (BYOK headers / URL params).
  {{- end }}
